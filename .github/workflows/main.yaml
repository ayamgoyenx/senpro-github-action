name: Test, Build, and Deploy | Modul 01 - Lab2.2 Senior Project

on: 
	push : 
		brancher: [main]
jobs:
	test-build:
		runs-on: ubuntu-latest		
strategy:
		matrix:
			node-version: [16.x]

steps:
- uses: actions/checkout@v4
- name: Testing Build Pre-Deploy
uses: actios/setup-node@v4
with: 
	nodeversion: ${{ matrix.node-version}}
	cache: "npm"
-run: npm i
-run: npm run build

